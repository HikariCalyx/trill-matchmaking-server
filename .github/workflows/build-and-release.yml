name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary-name: trill-signaling-server_amd64-linux
            asset-path: target/x86_64-unknown-linux-gnu/release/trill-signaling-server
            
          - runs-on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            binary-name: trill-signaling-server_arm64-linux
            asset-path: target/aarch64-unknown-linux-gnu/release/trill-signaling-server
            
          - runs-on: ubuntu-22.04-arm
            target: armv7-unknown-linux-gnueabihf
            binary-name: trill-signaling-server_armv7-linux
            asset-path: target/armv7-unknown-linux-gnueabihf/release/trill-signaling-server
            
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: trill-signaling-server_amd64-windows.exe
            asset-path: target/x86_64-pc-windows-msvc/release/trill-signaling-server.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross for armv7 cross-compilation
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: cargo install cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary (armv7 with cross)
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary (native)
        if: matrix.target != 'armv7-unknown-linux-gnueabihf'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp ${{ matrix.asset-path }} ${{ matrix.binary-name }}
          xz -9 -e ${{ matrix.binary-name }}

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "${{ matrix.asset-path }}" -Destination "${{ matrix.binary-name }}"
          $ProgressPreference = 'SilentlyContinue'
          # Install xz if not present
          if (-not (Get-Command xz -ErrorAction SilentlyContinue)) {
            choco install xz -y
          }
          xz -9 -e "${{ matrix.binary-name }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary-name }}.xz
          path: ${{ matrix.binary-name }}.xz
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.xz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
